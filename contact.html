    <div class="site-container">
        <div class="mycontact">
            <h1>Contact Us</h1>
        </div>
        <div class="mapouter">
            <div class="gmap_canvas"><iframe class="gmap_iframe" frameborder="0" scrolling="no" marginheight="0"
                    marginwidth="0"
                    src="https://maps.google.com/maps?width=600&amp;height=728&amp;hl=en&amp;q=2880 Broadway, New York&amp;t=&amp;z=14&amp;ie=UTF8&amp;iwloc=B&amp;output=embed"></iframe><a

                    google map embed html</a></div>
            <style>
                .mapouter {
                    position: relative;
                    text-align: right;
                    width: 600px;
                    height: 728px;
                }

                .gmap_canvas {
                    overflow: hidden;
                    background: none !important;
                    width: 600px;
                    height: 728px;
                }

                .gmap_iframe {
                    width: 600px !important;
                    height: 728px !important;
                }
            </style>
        </div>

        <div class="mypop">
            <div id="messagebox">
                <!-- starting box popup -->
                <div id="popupContact">
                    <!-- contact form -->
                    <form action="#" id="form" method="POST" name="form">
                        <h2>Contact Us</h2>
                        <input type="text" id="name" name="name" placeholder="Name">
                        <input type="email" id="email" name="email" placeholder="Email">
                        <textarea name="message" id="msg" placeholder="message"></textarea>
                        <a href="javascript:input_fields()" id="submit">Send Message</a>
                    </form>
                </div>
                <!-- this is end of popup form -->
            </div>
            <a class="mybutton" id="popup" onclick="show_form()">Contact Us</a>
            <!-- this is the end of popmessage -->
