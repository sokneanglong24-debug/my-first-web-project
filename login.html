            <h1>Login</h1>

        <div class="welcome">
            <form id="loginform" action="media.html" method="POST">
                <h2>sign in</h2>
                <div class="row">
                    <p>
                        <label for="email">Your Email</label>
                        <input id="loginemail" type="email" name="email" placeholder="example@gmail.com"
                            required="required">
                    </p>
                    <p>
                        <label for="password">Password</label>
                        <input id="loginpass" type="password" name="password" placeholder="**********"
                            required="required">

                    </p>
                    <p class="keeplogin">
                        <input type="checkbox" name="keep" id="keep" value="keep">
                        <label for="keep">Keep me login</label>
                    </p>
                    <p class="recoverpassword">
                        <a href="#recoverpassword">forgot password</a>
                    </p>
                    <input type="submit" value="login">
                    <p class="join">
                        <label for="new_member">Not yet a member</label>
                        <a href="signup.html">Resgister</a>
                    </p>
                </div>
            </form>
