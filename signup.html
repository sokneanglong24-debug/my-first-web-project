    <div class="site-container">
        <div class="sign-up">
            <h1>Signup</h1>
        </div>
        <div id="register" class="regform">
            <form id="reg" action="login.html" method="POST">
                <h2>Already a member?<a href="login.html">Login</a>
                </h2>
                <p>
                    <label for="firstname" class="fname">First Name</label>
                    <input type="text" name="firstname" id="name" placeholder="Hello" required="required">
                </p>
                <p>
                    <label for="lastname" class="lname">Last Name</label>
                    <input type="text" name="lastname" id="name" placeholder="world" required="required">
                </p>
                <p>
                    <label for="email" class="email">Your email</label>
                    <input type="email" name="emailsignup" id="email" placeholder="example@gmail.com"
                        required="required">
                </p>
                <p>
                    <label for="password" class="passwd">Passworld</label>
                    <input type="password" name="passwordsignup" id="password" placeholder="*********"
                        required="required" min="6">
                </p>
                <p>
                    <label for="password" class="passwd">Confirm</label>
                    <input type="password" name="passwordsignup" id="password" placeholder="*********"
                        required="required" min="6">
                </p>
                <p>
                    <label for="country">Country</label>
                    <select name="country" id="country">
                        <option value="cambodia">Cambodia</option>
                        <option value="USA">VSA</option>
                        <option value="China">China</option>
                    </select>
                </p>
                <p>
                    <label for="age" class="birth">Birth Date</label>
                    <input type="date" name="DOB" required="required">
                </p>
                <p>
                    <label for="course" class="learn">Course:</label>
                    <input type="checkbox" name="course1" value="Java">Java
                    <input type="checkbox" name="course2" value="C++">C++
                    <input type="checkbox" name="course3" value="python">Python
                    <input type="checkbox" name="course1" value="Node.js">Node.js
                </p>
                <p>
                    <label for="sex" class="robot">Gender:</label>
                    <input type="radio" name="gender" value="male">Male
                    <input type="radio" name="gender" value="female">Female
                    <input type="radio" name="gender" value="other">Other
                </p>
                <p class="signup-button">
                    <input type="submit" value="Sign up">
                </p>
            </form>
        </div>
